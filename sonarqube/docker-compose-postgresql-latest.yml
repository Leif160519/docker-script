version: "3"
services:
  postgres:
    container_name: postgres
    image: postgres:10
    restart: always
    ports:
      - 5432
    volumes:
      - /etc/localtime:/etc/localtime:ro
    environment:
      - "POSTGRES_USER=sonar"
      - "POSTGRES_PASSWORD=sonar"
      - "POSTGRES_DB=sonar"

  sonarqube:
    container_name: sonarqube
    image: sonarqube:latest
    restart: always
    ports:
      - 9000:9000
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - ./sonar-l10n-zh-plugin-8.7.jar:/opt/sonarqube/extensions/plugins/sonar-l10n-zh-plugin-8.7.jar:ro
    environment:
      - "SONARQUBE_JDBC_USERNAME=sonar"
      - "SONARQUBE_JDBC_PASSWORD=sonar"
      - "SONARQUBE_JDBC_URL=jdbc:postgresql://postgres:5432/sonar"
    depends_on:
      - postgres
